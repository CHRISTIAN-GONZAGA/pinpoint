# Render Blueprint — PINPOINT API
# Deploy: connect this repo in Render Dashboard → New → Blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: pinpoint-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DEBUG_MODE
        value: "false"
      - key: AUTO_SEED
        value: "true"
      - key: APP_VERSION
        value: "2.0.0"
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGINS
        value: "*"
      - key: AI_USE_CHROMA
        value: "false"
      - key: CACHE_TTL_SECONDS
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: pinpoint-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # Optional — enable cloud AI chat (RAG) on Render:
      # - key: OPENAI_API_KEY
      #   sync: false
      # - key: AI_USE_CHROMA
      #   value: "true"

databases:
  - name: pinpoint-db
    plan: free
    databaseName: pinpoint
    user: pinpoint
