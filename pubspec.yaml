name: pinpoint
description: AI-powered Public Transport and Tourism Accessibility Platform for Butuan City.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4
  equatable: ^2.0.7
  intl: ^0.20.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  pdf: ^3.11.3
  path_provider: ^2.1.5
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/data/routes/
    - assets/data/transport/
    - assets/data/tourism/
    - assets/data/emergency/
    - assets/data/knowledge/
    - assets/data/system/
